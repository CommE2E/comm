name: Identity tests (Nix)

on:
  push:
    branches: [master]
    paths:
      - 'services/identity/**'
      - 'shared/protos/identity_unauthenticated.proto'
      - 'flake.*'
      - 'nix/**'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      harbormaster_build_target_phid:
        required: true
        type: string
      phabricator_diff_id:
        required: true
        type: string
      phabricator_revision_id:
        required: true
        type: string
      staging_base_ref:
        required: true
        type: string
      staging_diff_ref:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout staged diff
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.staging_diff_ref }}
          fetch-depth: 0
      - name: Checkout normal ref
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v17
        with:
          extra_nix_config: |
            extra-substituters = https://comm.cachix.org
            extra-trusted-public-keys = comm.cachix.org-1:70RF31rkmCEhQ9HrXA2uXcpqQKGcUK3TxLJdgcUCaA4=
      - name: Identity tests
        working-directory: ./services/identity
        run: nix develop --accept-flake-config --command cargo test
