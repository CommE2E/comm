name: CMake Lint

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      harbormaster_build_target_phid:
        required: true
        type: string
      phabricator_diff_id:
        required: true
        type: string
      phabricator_revision_id:
        required: true
        type: string
      staging_base_ref:
        required: true
        type: string
      staging_diff_ref:
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout staged diff
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.staging_diff_ref }}
          fetch-depth: 0

      - name: Checkout normal ref
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v3

      - name: Install cmakelang
        run: python3 -m pip install cmakelang

      - name: Run cmake-lint
        run: |
          shopt -s globstar
          cmake-lint **/CMakeLists.txt **/*.cmake
