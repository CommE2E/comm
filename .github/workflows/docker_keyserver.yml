name: Docker keyserver CI

on:
  push:
    branches: [master]
    paths-ignore:
      - 'native/**'
      - 'docs/**'
      - 'services/**'
      - 'desktop/**'
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      harbormaster_build_target_phid:
        required: true
        type: string
      phabricator_diff_id:
        required: true
        type: string
      phabricator_revision_id:
        required: true
        type: string
      staging_base_ref:
        required: true
        type: string
      staging_diff_ref:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free up disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h

      - name: Check out staged diff
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/checkout@v3
        with:
          ref: ${{ inputs.staging_diff_ref }}
          fetch-depth: 0

      - name: Check out normal ref
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify docker-compose config
        working-directory: ./keyserver
        run: |
          touch .env
          docker compose config --quiet

      - name: Prepare build args
        id: prepare_args
        run: |
          echo "host_uid=$(id -u)" >> $GITHUB_OUTPUT
          echo "host_gid=$(id -g)" >> $GITHUB_OUTPUT

      - name: Build Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./keyserver/Dockerfile
          tags: commapp/node-keyserver:1.0
          push: false
          load: false
          no-cache: true
          build-args: |
            HOST_UID=${{ steps.prepare_args.outputs.host_uid }}
            HOST_GID=${{ steps.prepare_args.outputs.host_gid }}
