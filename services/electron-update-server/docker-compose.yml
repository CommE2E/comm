services:
  electron-update-server:
    image: commapp/electron-update-server:3.0
    build:
      context: ../..
      dockerfile: services/electron-update-server/Dockerfile
    restart: unless-stopped
    environment:
      HAZEL_ACCOUNT: CommE2E
      HAZEL_REPOSITORY: comm
    ports:
      - '127.0.0.1:8080:80'
